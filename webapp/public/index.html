<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <link rel="icon" href="%PUBLIC_URL%/favicon.ico" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#000000" />
  <meta name="description" content="AI-powered skin disease classification with Grad-CAM visualization" />
  <link rel="apple-touch-icon" href="%PUBLIC_URL%/logo192.png" />
  <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />
  
  <!-- Open Graph / Facebook -->
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://skindisease-ai.com/" />
  <meta property="og:title" content="SkinAI - AI-Powered Skin Disease Classification" />
  <meta property="og:description" content="Advanced AI for dermatological diagnosis with interpretable visualizations" />
  <meta property="og:image" content="%PUBLIC_URL%/og-image.png" />

  <!-- Twitter -->
  <meta property="twitter:card" content="summary_large_image" />
  <meta property="twitter:url" content="https://skindisease-ai.com/" />
  <meta property="twitter:title" content="SkinAI - AI-Powered Skin Disease Classification" />
  <meta property="twitter:description" content="Advanced AI for dermatological diagnosis with interpretable visualizations" />
  <meta property="twitter:image" content="%PUBLIC_URL%/twitter-image.png" />

  <!-- Medical/Healthcare specific meta tags -->
  <meta name="medical-specialty" content="Dermatology" />
  <meta name="health-condition" content="Skin Diseases" />
  <meta name="target-audience" content="Healthcare Professionals, Researchers" />
  <meta name="clinical-use" content="Decision Support System" />
  
  <!-- Security and privacy -->
  <meta name="robots" content="index, follow" />
  <meta http-equiv="X-Content-Type-Options" content="nosniff" />
  <meta http-equiv="X-Frame-Options" content="DENY" />
  <meta http-equiv="X-XSS-Protection" content="1; mode=block" />
  
  <title>SkinAI - AI-Powered Skin Disease Classification</title>
  
  <!-- Preload critical resources -->
  <link rel="preload" href="/logo192.png" as="image" type="image/png" />
  
  <!-- Google Fonts (optional) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  
  <style>
    /* Loading screen */
    #root {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      font-family: 'Inter', sans-serif;
    }
    
    .loading-container {
      text-align: center;
      color: white;
    }
    
    .loading-spinner {
      width: 50px;
      height: 50px;
      border: 4px solid rgba(255, 255, 255, 0.3);
      border-top: 4px solid white;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto 20px;
    }
    
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    
    .loading-text {
      font-size: 18px;
      font-weight: 500;
      opacity: 0.9;
    }
    
    .loading-subtext {
      font-size: 14px;
      opacity: 0.7;
      margin-top: 8px;
    }
  </style>
</head>
<body>
  <noscript>You need to enable JavaScript to run this app.</noscript>
  
  <!-- Loading screen -->
  <div id="loading-screen" class="loading-container">
    <div class="loading-spinner"></div>
    <div class="loading-text">Loading SkinAI</div>
    <div class="loading-subtext">AI-Powered Dermatology Assistant</div>
  </div>
  
  <!-- React app root -->
  <div id="root"></div>
  
  <script>
    // Hide loading screen when React app loads
    window.addEventListener('load', function() {
      setTimeout(function() {
        const loadingScreen = document.getElementById('loading-screen');
        const root = document.getElementById('root');
        
        if (loadingScreen && root.children.length > 0) {
          loadingScreen.style.display = 'none';
        }
      }, 100);
    });
    
    // Error handling
    window.addEventListener('error', function(e) {
      console.error('Application error:', e.error);
    });
    
    // Service worker registration (for PWA)
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function() {
        navigator.serviceWorker.register('/sw.js')
          .then(function(registration) {
            console.log('SW registered: ', registration);
          })
          .catch(function(registrationError) {
            console.log('SW registration failed: ', registrationError);
          });
      });
    }
  </script>
</body>
</html>
